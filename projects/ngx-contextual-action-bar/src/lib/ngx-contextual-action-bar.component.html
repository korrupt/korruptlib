<div class="component"
    ngxScrollhandler
>   
    <ng-container *ngIf="layer$ | async as layer">
        <div class="navbar"
            *ngIf="layer.id"
            [style.color]="layer.color"
            [style.background]="layer.background"
            [@fixedInView]="fixed$ | async"
        >
            <ng-container *ngIf="button$ | async as _button">
                <div class="button">
                    <button [@buttonAnimation]="_button" mat-icon-button (click)="handleButtonClick(layer.id)">
                        <mat-icon class="old">{{_button[0]}}</mat-icon>
                        <mat-icon class="new">{{_button[1]}}</mat-icon>
                    </button>
                </div>
            </ng-container>
            <h2 class="title">{{layer?.title}}</h2>
            <div class="actions">
                <ngx-actions-overflow-menu></ngx-actions-overflow-menu>
            </div>
        </div>
    </ng-container>
    <div class="content" [class.nomargin]="nomargin$ | async">
        <ng-content></ng-content>
    </div>
</div>
